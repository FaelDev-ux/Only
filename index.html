<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bolo de Mãe JP Confeitaria — Cardápio</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Great+Vibes&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script type="module" src="scripts.js"></script>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-frame">
        <div class="cart-fab">
          <a class="admin-link" href="admin.html">Acessar admin</a>
          <button class="cart-button" type="button" id="cart-open">
            <span>Carrinho</span>
            <span class="cart-count" id="cart-count">0</span>
          </button>
        </div>
        <div class="logo-wrap">
          <img src="logo.jpeg" alt="Logo Bolo de Mãe JP Confeitaria" />
        </div>
        <div class="hero-text">
          <p class="brand">Bolo de Mãe JP Confeitaria</p>
          <h1>Cardápio</h1>
          <p class="subtitle">Delicadeza artesanal em cada fatia</p>
        </div>
        <div class="ornament ornament-left" aria-hidden="true"></div>
        <div class="ornament ornament-right" aria-hidden="true"></div>
      </div>
    </header>

    <main class="menu" id="menu-container"></main>

    <footer class="footer">
      <div class="footer-line"></div>
      <p>Encomendas e detalhes pelo WhatsApp • @bolodemaejp</p>
    </footer>
  </div>

  <div class="modal" id="product-modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" type="button" aria-label="Fechar" data-close="true">✕</button>
      <div class="modal-photo" id="modal-photo"></div>
      <div class="modal-content">
        <h3 id="modal-title"></h3>
        <p class="modal-price" id="modal-price"></p>
        <p class="modal-details" id="modal-details"></p>
        <button class="modal-add" type="button" id="modal-add">Adicionar ao carrinho</button>
      </div>
    </div>
  </div>

  <aside class="cart-panel" id="cart-panel" aria-hidden="true">
    <div class="cart-header">
      <h3>Seu Carrinho</h3>
      <button class="cart-close" type="button" id="cart-close">Fechar</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <strong id="cart-total">R$ 0</strong>
      </div>
      <button class="cart-checkout" type="button" id="cart-checkout">Finalizar pedido</button>
    </div>
  </aside>

  <div class="modal" id="checkout-modal" aria-hidden="true">
    <div class="modal-backdrop" data-close="checkout"></div>
    <div class="modal-card modal-card-wide" role="dialog" aria-modal="true" aria-labelledby="checkout-title">
      <button class="modal-close" type="button" aria-label="Fechar" data-close="checkout">✕</button>
      <div class="modal-content">
        <h3 id="checkout-title">Finalizar pedido</h3>
        <p class="modal-details">Preencha seus dados para enviar o pedido.</p>
      </div>
      <form class="checkout-form" id="checkout-form">
        <div class="form-grid">
          <label>
            Nome completo
            <input type="text" name="name" required />
          </label>
          <label>
            WhatsApp
            <input type="text" name="phone" required />
          </label>
          <label>
            Forma de pagamento
            <select name="payment" required>
              <option value="">Selecione</option>
              <option value="cartao">Cartão</option>
              <option value="dinheiro">Dinheiro</option>
              <option value="pix">Pix</option>
            </select>
          </label>
          <label>
            CEP
            <input type="text" name="cep" required />
          </label>
          <label>
            Endereço
            <input type="text" name="address" required />
          </label>
          <label>
            Bairro
            <input type="text" name="district" required />
          </label>
          <label>
            Complemento
            <input type="text" name="complement" />
          </label>
          <label>
            Observações
            <textarea name="notes" rows="3"></textarea>
          </label>
        </div>
        <button class="modal-add" type="submit">Enviar pedido</button>
      </form>
    </div>
  </div>
</body>
</html>
